# localmind configuration — copy to config/local.toml and edit.
# All values can be overridden by env vars prefixed with LOCALMIND_.

[ollama]
# URL of your local Ollama server.
host = "http://127.0.0.1:11434"
# Primary chat model. The installer pulls a small-but-capable default.
# Swap to a larger variant for better reasoning at the cost of speed:
# `llm models --chat <name>` after pulling it with Ollama.
chat_model = "qwen2.5-coder:3b"
# Optional fast-path model for the cascade router. When set AND different
# from chat_model, the agent routes trivial / short / chatty turns here
# AND auxiliary calls (query expansion, etc.). chat_model still handles
# real work: code changes, long prompts, explicit-tool requests. Leave
# blank to disable cascading — every turn will go to chat_model.
fast_model = ""
# Secondary model used for vision-capable turns (image inputs). Pick
# something that supports image tokens; otherwise leave equal to
# chat_model to fall back to text-only.
vision_model = "gemma3:4b"
# Embedding model for memory search. Any Ollama embedding model works;
# dimension is detected per row (the vec0 table expects 768).
embed_model = "nomic-embed-text"
# Request timeout in seconds (large models on cold start can be slow).
timeout_secs = 600
# Token budget for each reply. 8k covers 95% of interactive turns and keeps
# prompt-processing time low. Raise to 16384 / 32768 if you paste large
# documents into the REPL and want them all in-context at once.
num_ctx = 8192
# How long Ollama keeps the model loaded in GPU/unified memory after the
# last request. Default "5m" means the *next* turn after a coffee break
# pays a full cold-load. "30m" keeps the model resident across typical
# pauses. Set to "0" to unload immediately, "-1" to keep resident forever.
keep_alive = "30m"
# Sampling. 0.3 / 0.95 is a neutral default. For strict coding models,
# bump temperature down to 0.2. For reasoning MoEs, bump up to 0.6.
temperature = 0.3
top_p = 0.95
# Auto-compact conversation history when it passes this fraction of num_ctx.
# A summariser call replaces the oldest middle messages with one bulleted
# summary system message; the main system prompt and the last
# `compact_keep_tail` messages stay verbatim. Only fires between turns.
# Set to 0.0 to disable (the `/compact` slash command still works manually).
auto_compact_at = 0.75
# Messages preserved verbatim at the tail during compaction. Lower = more
# aggressive compression, higher = safer but reclaims less.
compact_keep_tail = 8
# How many messages to pull from the previous session on launch (per
# cwd). Small values keep short-term continuity without letting stale
# prior-session style anchor the model. Set to 0 to disable auto-resume.
resume_messages = 8

[memory]
# Path to the SQLite memory database. %DATA% expands to the OS data dir.
db_path = "%DATA%/memory.db"
# Max memories to return from a hybrid search.
top_k = 12
# Legacy score-fusion weights. Ignored now — fusion is Reciprocal Rank Fusion
# (rank-based, parameter-free). Kept here for config backwards compat.
bm25_weight = 0.4
vector_weight = 0.6
# How aggressively older memories decay in ranking (half-life in days).
temporal_half_life_days = 30.0
# Auto-summarise and persist conversation turns as memories.
auto_persist = true
# Query expansion — ask the LLM for N paraphrasings before searching.
# Each variant costs one extra Ollama round-trip; default 0 keeps recall fast.
expansion_variants = 0
# When true, hybrid search asks Ollama for an embedding and runs vector ANN.
# Set to false for pure-BM25 recall (~10× faster on slow Ollama, less semantic).
vector_search = true
# Contextual Retrieval — before embedding a stored memory, ask the LLM for
# a one-sentence context line and prepend it. ~30-50% recall improvement
# on short/ambiguous notes at the cost of one extra LLM call per insert
# (runs on the background embedding worker, doesn't block turns).
contextual_embed = false
# Entity extraction — ask the LLM for entities + relationships per memory
# and populate kg_entities / kg_edges. One extra chat call per insert.
# Required to unlock graph-based retrieval; harmless when off.
entity_extraction = false
# Graph-based retrieval — Personalized PageRank over the entity graph,
# seeded from query entities, fused with BM25 + vector via RRF. Needs
# entity_extraction = true to have graph content; harmless (returns
# empty) when the graph is sparse or no query entities match.
graph_search = false
# LLM-as-judge reranker. When set, hybrid_search pulls `rerank_fetch_k`
# candidates and this model rescores them. Recommended: a small model
# distinct from chat_model. Empty = disabled.
rerank_model = ""
rerank_fetch_k = 50

[tools]
# Root directory the agent is allowed to read/write under.
# Leave empty to allow the entire filesystem (not recommended).
workspace_root = ""
# Hard-deny list — paths matching these globs are never touched.
deny_globs = ["**/.ssh/**", "**/.gnupg/**", "**/.aws/**", "**/*.key", "**/*.pem", "**/id_rsa*"]
# Shell command allow-list regex. Empty = prompt user for each command.
shell_allow_regex = ""

# Default session permission mode. One of:
#   read-only       — no writes, no shell mutations, no web
#   workspace-write — default; writes confined to workspace_root
#   unrestricted    — everything still prompts, but no extra guard-rails
# Override per-session with `--mode <...>` or `/mode <...>` in the REPL.
mode = "workspace-write"

# Permission rules. Syntax: `tool(matcher)` or a bare `tool` for any invocation.
# Matchers support `*` for prefix / suffix / contains.
#
# Examples:
#   allow_rules = ["read_file(src/**)", "shell(git status)", "shell(ls*)"]
#   deny_rules  = ["shell(git push*)", "shell(*rm -rf*)", "write_file(/etc/*)"]
#   ask_rules   = ["web_fetch", "web_search", "shell(curl*)"]
#
# Allow rules auto-approve without a prompt.
# Deny rules refuse outright with no prompt.
# Ask rules ALWAYS prompt — even if an allow rule matched or the user picked
# "always this session". Use for sensitive ops.
allow_rules = []
deny_rules  = []
ask_rules   = []

[web]
# Brave Search API. Get a key at https://api.search.brave.com/
# Free tier is 2000 queries/month, which is plenty for one user.
brave_api_key = ""
# Endpoint (usually no need to change).
brave_endpoint = "https://api.search.brave.com/res/v1/web/search"
# Max results to return per search.
max_results = 8
# Refuse outbound HTTP/WHOIS to private (RFC1918), loopback, link-local
# (incl. cloud-metadata 169.254.169.254), and multicast addresses. Keeps
# prompt-injected fetches from exfiltrating cloud credentials or hitting
# internal services. Set to false ONLY on networks where you legitimately
# need internal HTTP access from the agent.
block_private_addrs = true

[repl]
# Show `· tool_name` lines in the REPL when the model runs a tool. Off by
# default — clutters the transcript and tools are already in the audit log.
# Flip on when you're debugging what the model is reaching for.
show_tool_calls = false
# Ask before running any shell command or file write.
confirm_writes = true
# Colour output.
color = true

[updates]
# Check GitHub releases for a newer binary. Results are cached in
# <data_dir>/update-check.json and the HTTP call runs on a background
# task — it never delays startup. Set to false, or export
# LOCALMIND_NO_UPDATE_CHECK=1, to disable entirely.
check = true
# How often to refresh the cache, in hours. The first run after this
# interval elapses spawns a single GitHub API call.
check_interval_hours = 24
